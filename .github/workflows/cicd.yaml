name: CI/CD Pipeline Terraform AWS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ============================================
  # JOB 1 — Qualité du code Terraform
  # ============================================
  terraform-lint:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🔧 Installation Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: ✅ Vérification du format
        run: terraform fmt -check -recursive

      - name: ✅ Validation de la syntaxe
        run: |
          terraform init -backend=false
          terraform validate

  # ============================================
  # JOB 2 — Scan de sécurité avec Trivy
  # ============================================
  security-scan:
    runs-on: ubuntu-latest
    needs: terraform-lint
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🔒 Scan Trivy — vulnérabilités IaC
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          format: "table"

  # ============================================
  # JOB 3 — Plan Terraform
  # ============================================
  terraform-plan:
    runs-on: ubuntu-latest
    needs: security-scan
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🔧 Installation Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: 🚀 Terraform Init
        run: terraform init

      - name: 📋 Terraform Plan
        run: terraform plan -no-color

  # ============================================
  # JOB 4 — Apply automatique (sur main seulement)
  # ============================================
  terraform-apply:
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🔧 Installation Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: 🚀 Terraform Init
        run: terraform init

      - name: ✅ Terraform Apply
        run: terraform apply -auto-approve